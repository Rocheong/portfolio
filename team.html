<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>팀원 소개 - Dev Portfolio</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="top-nav">
      <div class="nav-container">
        <div class="nav-left">
          <a href="index.html" class="logo">🏠 Main Home</a>
        </div>
        <ul class="nav-right">
          <li><a href="assignments.html">과제 소개</a></li>
          <li><a href="project.html">팀 프로젝트</a></li>
          <li>
            <a href="team.html" style="color: var(--primary-purple)"
              >팀원 소개</a
            >
          </li>
        </ul>
      </div>
    </header>

    <main class="wrapper">
      <section class="info-block full-width">
        <h2>🤝 프로젝트 팀원 소개</h2>
        <p style="margin-bottom: 30px; color: var(--text-sub)">
          함께 프로젝트를 성공적으로 이끈 팀원들과 각자의 역할을 소개합니다.
        </p>

        <div class="card-container">
          <div class="item-card team-card">
            <img src="https://via.placeholder.com/100" alt="팀원 1" />
            <h3>김마레 (본인)</h3>
            <p
              style="
                color: var(--primary-purple);
                font-weight: bold;
                margin-bottom: 10px;
              "
            >
              Back-end / Infra
            </p>
            <p>
              데이터베이스 설계, API 서버 구축 및 AWS를 활용한 전체 프로젝트
              배포 담당.
            </p>
          </div>

          <div class="item-card team-card">
            <img src="https://via.placeholder.com/100" alt="팀원 2" />
            <h3>홍길동</h3>
            <p
              style="
                color: var(--primary-purple);
                font-weight: bold;
                margin-bottom: 10px;
              "
            >
              Front-end
            </p>
            <p>
              UI/UX 기획 및 반응형 웹 퍼블리싱. 비동기 통신을 통한 클라이언트
              로직 구현.
            </p>
          </div>

          <div class="item-card team-card">
            <img src="https://via.placeholder.com/100" alt="팀원 3" />
            <h3>이순신</h3>
            <p
              style="
                color: var(--primary-purple);
                font-weight: bold;
                margin-bottom: 10px;
              "
            >
              Data & QA
            </p>
            <p>
              초기 데이터 파이프라인 구축 및 서비스 품질(QA) 테스트, 버그 리포트
              관리.
            </p>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
