<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>팀 프로젝트 - Dev Portfolio</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="top-nav">
      <div class="nav-container">
        <div class="nav-left">
          <a href="index.html" class="logo">🏠 Main Home</a>
        </div>
        <ul class="nav-right">
          <li><a href="assignments.html">과제 소개</a></li>
          <li>
            <a href="project.html" style="color: var(--primary-purple)"
              >팀 프로젝트</a
            >
          </li>
          <li><a href="team.html">팀원 소개</a></li>
        </ul>
      </div>
    </header>

    <main class="wrapper">
      <section class="info-block full-width">
        <h2>🚀 팀 프로젝트: [프로젝트 이름 입력]</h2>

        <div
          style="
            background-color: var(--bg-color);
            padding: 30px;
            border-radius: 15px;
            margin-top: 20px;
          "
        >
          <h3 style="color: var(--dark-purple); margin-bottom: 10px">
            📝 프로젝트 개요
          </h3>
          <p style="margin-bottom: 20px; line-height: 1.8">
            이곳에 팀 프로젝트의 상세한 소개와 기획 의도, 주요 기능 등을
            적어주세요. 사용자가 겪는 어떤 문제를 해결하기 위해 이 프로젝트를
            시작했는지 구체적으로 작성하면 좋습니다.
          </p>

          <h3 style="color: var(--dark-purple); margin-bottom: 10px">
            🛠️ 사용 기술 (Tech Stack)
          </h3>
          <div class="skill-tags" style="margin-bottom: 30px">
            <span class="tag">HTML/CSS</span>
            <span class="tag">JavaScript</span>
            <span class="tag">Java / Spring</span>
            <span class="tag">MySQL</span>
          </div>

          <h3 style="color: var(--dark-purple); margin-bottom: 15px">
            🔗 배포 및 소스 코드
          </h3>
          <div style="display: flex; gap: 15px; flex-wrap: wrap">
            <a href="#" target="_blank" class="btn" style="margin-top: 0"
              >🌐 직접 배포한 주소 (Deploy)</a
            >
            <a
              href="https://github.com/kimmare/team-project"
              target="_blank"
              class="btn"
              style="background-color: #333; margin-top: 0"
              >💻 개인 깃허브 소스코드</a
            >
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
